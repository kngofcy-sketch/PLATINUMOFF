    <style>
      /* --- HACK PARA REEMPLAZAR EL LOGO VIEJO POR EL PREMIUM --- */
      
      /* 1. Ocultamos el escudo y texto viejo del encabezado */
      header div a svg, 
      header a div svg,
      header .logo-old,
      header div[class*="logo"] {
        display: none !important;
      }
      
      /* 2. Inyectamos tu logo metálico nuevo desde la raíz de tu repositorio */
      header div a::before,
      header a::before {
        content: "";
        display: inline-block;
        width: 140px; 
        height: 45px;
        background-image: url('/logo-new..png'); /* Ruta directa desde donde le diste commit */
        background-size: contain;
        background-repeat: no-repeat;
        background-position: left center;
        margin-right: 10px;
        vertical-align: middle;
      }

      /* --- FOOTER INFERIOR OBLIGATORIO --- */
      .maintenance-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100vw;
        background-color: #080808;
        text-align: center;
        padding: 15px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: #888888;
        border-top: 1px solid #1c1c1c;
        line-height: 1.5;
        z-index: 100000;
      }
    </style>
